<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chart Detail - Chord Charts Library</title>
  <meta name="description" content="View and transpose an iReal Pro chord chart from the library." />

  <!-- Favicon: piano keyboard emoji as SVG data URI -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎹</text></svg>" />

  <!-- Google Fonts: same family as the library index -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/view.css" />
</head>
<body>

  <!-- Main navigation -->
  <nav class="navbar" role="navigation" aria-label="Chart viewer navigation">
    <div class="navbar__brand">
      <span class="navbar__icon" aria-hidden="true">🎹</span>
      <span class="navbar__title">Chord Charts Library</span>
    </div>

    <div class="navbar__actions">
      <a href="index.html" class="nav-btn" title="Back to library" aria-label="Back to library">
        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
      </a>
    </div>
  </nav>

  <!-- The viewer module replaces this loading state after fetching the chart. -->
  <div id="page-container">
    <main class="viewer-shell">
      <section class="viewer-state" aria-live="polite">
        <div class="loader" aria-label="Loading chart">
          <span></span><span></span><span></span>
        </div>
        <p>Loading chart...</p>
      </section>
    </main>
  </div>

  <!-- Vendored libraries from https://github.com/daumling/ireal-renderer/tree/master/src -->
  <script src="js/vendor/ireal-renderer/ireal-reader-tiny.js"></script>
  <script src="js/vendor/ireal-renderer/ireal-renderer.js"></script>

  <!-- Viewer application -->
  <script type="module" src="js/viewer.js"></script>
</body>
</html>
