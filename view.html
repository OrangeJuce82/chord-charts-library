<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chart Detail - Chord Charts Library</title>
  <meta name="description" content="View and transpose an iReal Pro chord chart from the library." />
  <meta name="theme-color" content="#161411" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="img/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="img/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="img/icons/favicon-16.png" />
  <link rel="apple-touch-icon" href="img/icons/apple-touch-icon.png" />

  <!-- Google Fonts: same family as the library index -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/view.css" />
</head>
<body>

  <!-- Main navigation -->
  <nav class="navbar" role="navigation" aria-label="Chart viewer navigation">
    <div class="navbar__brand">
      <img class="navbar__icon" src="img/icons/favicon-32.png" width="32" height="32" alt="" aria-hidden="true" />
      <span class="navbar__title">Chord Charts Library</span>
      <span class="navbar__version">v0.1.1</span>
    </div>

    <div class="navbar__actions">
      <button
        id="btn-random-viewer"
        class="nav-btn"
        title="Open a random chart"
        aria-label="Open a random chart"
      >
        <i class="fa-solid fa-shuffle" aria-hidden="true"></i>
      </button>
      <a href="index.html" class="nav-btn" data-history-back title="Back to library" aria-label="Back to library">
        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
      </a>
    </div>
  </nav>

  <!-- The viewer module replaces this loading state after fetching the chart. -->
  <div id="page-container">
    <main class="viewer-shell">
      <section class="viewer-state" aria-live="polite">
        <div class="loader" aria-label="Loading chart">
          <span></span><span></span><span></span>
        </div>
        <p>Loading chart...</p>
      </section>
    </main>
  </div>

  <!-- Vendored libraries from https://github.com/daumling/ireal-renderer/tree/master/src -->
  <script src="js/vendor/ireal-renderer/ireal-reader-tiny.js"></script>
  <script src="js/vendor/ireal-renderer/ireal-renderer.js"></script>

  <!-- Viewer application -->
  <script type="module" src="js/viewer.js"></script>
  <script type="module" src="js/pwa.js"></script>
</body>
</html>
